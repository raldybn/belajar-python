<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python di HTML dengan PyScript</title>

    <!-- Load PyScript CSS & JS -->
    <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
    <script defer src="https://pyscript.net/latest/pyscript.js"></script>
</head>
<body>
    <h1>Menjalankan Python di HTML</h1>

    <!-- Kode Python langsung di HTML -->
    <py-script>
        # Contoh Python
        nama = "Dunia"
        for i in range(3):
            print(f"Halo, {nama}! Ini baris ke-{i+1}")
    </py-script>

    <!-- Input dan Output -->
    <input id="namaInput" placeholder="Masukkan nama" />
    <button id="btnHalo">Sapa</button>
    <py-script></py-script>
</body>
</html>
